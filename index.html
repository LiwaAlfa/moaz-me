<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>دمشق</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="slider-container">
      <div class="slider">
        <div class="slide active">
          <video autoplay muted loop>
            <source src="assets/background.mp4" type="video/mp4" />
          </video>
        </div>
        <div class="slide">
          <img src="assets/7.jpg" alt="" />
        </div>
        <div class="slide">
          <img src="assets/8.jpg" alt="" />
        </div>
        <div class="slide">
          <img src="assets/9.png" alt="" />
        </div>
        <div class="slide">
          <img src="assets/10.png" alt="" />
        </div>
      </div>
    </div>
    <div class="overlay"></div>
    <div class="slider-bars">
      <span class="bar active"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </div>
    <div class="logo-box">
      <img src="assets/logo.png" alt="logo" class="logo-img" />
      <p class="logo-text">محافظة دمشق</p>
    </div>
    <div class="navbar-auto">
      <a href="#" >الأخبـــــــــــار</a>
      <a href="#">التعامــــيم</a>
      <a href="./damascus_timeline_2.html" style="width: 150px">النظرة الثقافية</a>
      <a href="#">الخدمـــــات</a>
      <a href="#" style="width: 150px"></a>
      <a href="#" style="width: 150px">دليل دمشق</a>
      <a href="./sami_projects_dark.html">المشاريــع</a>
      <a href="#" style="width: 140px">حملة دمشق</a>
      <a href="#" style="width: 130px">الاستثمارات</a>
    </div>
    <div class="title-container">
      <h1 class="title">دمشق</h1>
      <p class="subtitle">المدينة التي تتكئ على ألف حكاية . . .</p>
    </div>
    <!-- <div style="background-color: aqua; height: 100vh;"></div> -->
  </div>
</div>
<script>
  const slides = document.querySelectorAll(".slide");
  const bars = document.querySelectorAll(".bar");
  let index = 0;
  let interval;
  function activateSlide(i) {
    // remove current
    slides[index].classList.remove("active");
    bars[index].classList.remove("active");

    // reset animation
    bars[index].style.animation = "none";
    bars[index].offsetHeight; // force reflow

    // set new index
    index = i;

    // activate new
    slides[index].classList.add("active");
    bars[index].classList.add("active");
  }

  function showNextSlide() {
    let nextIndex = (index + 1) % slides.length;
    activateSlide(nextIndex);
  }

  function startSlider() {
    interval = setInterval(showNextSlide, 5000);
  }

  function resetSlider() {
    clearInterval(interval);
    startSlider();
  }

  // 🔥 CLICK EVENT
  bars.forEach((bar, i) => {
    bar.addEventListener("click", () => {
      activateSlide(i);
      resetSlider(); // continue auto sliding after click
    });
  });

  // start first
  bars[0].classList.add("active");
  startSlider();
</script>

 <!-- /JavaScript for slider -->

</body>
</html>
