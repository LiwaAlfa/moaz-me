<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>دمشق - خدمات</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="body">
    <header class="header" style="padding-top: 125px"></header>
    <section class="services">
      <div class="container">
        <h2 class="title-services">الخدمات الإلكترونية</h2>
        <div class="services-grid">
          <div class="service-card">
            <h3>التراخيص</h3>
            <p>يمكنك الإطلاع على كافة التراخيص المتواجدة ضمن محافظة دمشق</p>
            <button>عرض الخدمة</button>
          </div>
          <div class="service-card">
            <h3>ترخيص صلاحية</h3>
            <p>يمكنك الإطلاع على الصلاحيات المتواجدة ضمن محافظة دمشق</p>
            <button>عرض الخدمة</button>
          </div>
          <div class="service-card">
            <h3>قدم شكوى</h3>
            <p>يمكنك التقديم بطلب اي شكوى رسمياً متعلقة بمحافظة دمشق</p>
            <button>عرض الخدمة</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
